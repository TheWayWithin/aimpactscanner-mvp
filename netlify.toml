[build]
  # Build configuration for React + Vite
  command = "npm ci --include=dev && npm run build"
  publish = "dist"

[build.environment]
  # Node.js version for build - using 22 LTS for compatibility
  NODE_VERSION = "22"

# Serve llms.txt directly
[[redirects]]
  from = "/llms.txt"
  to = "/llms.txt"
  status = 200

# SPA redirect rule - catch all routes and serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    # HTTPS and security headers
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

    # Content Security Policy (Report-Only mode for monitoring)
    # Monitors CSP violations for 2-4 weeks before enforcing to ensure Stripe/Supabase/Analytics compatibility
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' https://js.stripe.com https://www.googletagmanager.com https://www.google-analytics.com; connect-src 'self' https://*.supabase.co https://api.stripe.com https://www.google-analytics.com https://*.up.railway.app; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; frame-src https://js.stripe.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self' https://checkout.stripe.com; frame-ancestors 'none'"

    # Permissions Policy - blocks unnecessary browser features, allows Stripe payments
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(self 'https://js.stripe.com'), usb=(), interest-cohort=()"

    # DNS Prefetch Control - enables faster external resource loading
    X-DNS-Prefetch-Control = "on"

    # CORS headers restricted to production domain (prevents CSRF attacks)
    # Note: Supabase handles its own CORS, this is for any future API endpoints
    Access-Control-Allow-Origin = "https://aimpactscanner.com"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization"

# HTML files - NEVER cache to ensure latest JS bundles load
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Caching for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Environment-specific configuration
[context.production.environment]
  NODE_ENV = "production"
  # Railway backend - enabled for production
  VITE_USE_RAILWAY_BACKEND = "true"
  VITE_RAILWAY_API_URL = "https://aimpactscanner-backend-production.up.railway.app"

[context.deploy-preview.environment]
  # Use STAGING database and test keys for deploy previews
  VITE_SUPABASE_URL = "https://isgzvwpjokcmtizstwru.supabase.co"  # STAGING (impactscanner-staging project)
  # VITE_SUPABASE_ANON_KEY = "your-test-anon-key"
  # VITE_STRIPE_PUBLISHABLE_KEY = "pk_test_your-test-publishable-key"
  # VITE_STRIPE_COFFEE_PRICE_ID = "price_your-test-coffee-price-id"

  # Railway backend - STAGING backend for staging/deploy previews
  VITE_USE_RAILWAY_BACKEND = "true"
  VITE_RAILWAY_API_URL = "https://aimpactscanner-backend-staging.up.railway.app"

# Branch deploys (e.g., develop branch → develop--aimpactscanner.netlify.app)
[context.branch-deploy]
  command = "npm ci --include=dev && npx vite build"

[context.branch-deploy.environment]
  VITE_SUPABASE_URL = "https://isgzvwpjokcmtizstwru.supabase.co"  # STAGING
  VITE_USE_RAILWAY_BACKEND = "true"
  VITE_RAILWAY_API_URL = "https://aimpactscanner-backend-staging.up.railway.app"

# Specific branch: develop
[context.develop]
  command = "npm ci --include=dev && npx vite build"

[context.develop.environment]
  VITE_SUPABASE_URL = "https://isgzvwpjokcmtizstwru.supabase.co"  # STAGING
  VITE_USE_RAILWAY_BACKEND = "true"
  VITE_RAILWAY_API_URL = "https://aimpactscanner-backend-staging.up.railway.app"

# Form handling (if needed for future contact forms)
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

# Function configuration (for Netlify Functions if we add them later)
[functions]
  directory = "netlify/functions"
  included_files = ["node_modules/**"]

# Plugin configuration
# Lighthouse disabled - consistently crashes on Netlify CI with exit code 2
# TODO: Re-enable once CI environment Lighthouse issues are resolved
