<!DOCTYPE html>
<html lang="en">
<head>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
        <h1 class="text-2xl font-bold mb-4">Test Stripe Live Payment</h1>
        <p class="text-gray-600 mb-6">Click below to test your Coffee Tier ($5/month) payment with live Stripe keys.</p>
        
        <div class="border rounded-lg p-4 mb-6">
            <h2 class="font-semibold mb-2">Coffee Tier</h2>
            <p class="text-3xl font-bold mb-2">$5<span class="text-sm text-gray-500">/month</span></p>
            <ul class="text-sm text-gray-600 mb-4">
                <li>✓ Unlimited analyses</li>
                <li>✓ Priority support</li>
                <li>✓ All framework factors</li>
            </ul>
        </div>

        <button 
            id="checkout-button" 
            class="w-full bg-blue-600 text-white py-3 px-6 rounded-lg font-semibold hover:bg-blue-700 transition"
        >
            Test Live Payment →
        </button>

        <div id="message" class="mt-4 text-sm"></div>
    </div>

    <script>
        // Your live Stripe publishable key
        const STRIPE_PUBLISHABLE_KEY = 'pk_live_51KSrA8IiC84gpR8Hf9dKTFIdR2rSzWtEuFlvQHBi3dLBNmojL0LLdTRDkCYfBtX1tYGbSNbIeykeDpLaSa3oUnnT00eelqRDiA';
        const PRICE_ID = 'price_1RnSa4IiC84gpR8HXmbDgaNy';
        
        document.getElementById('checkout-button').addEventListener('click', async () => {
            const button = document.getElementById('checkout-button');
            const message = document.getElementById('message');
            
            button.disabled = true;
            button.textContent = 'Loading...';
            message.innerHTML = '<span class="text-blue-600">Creating checkout session...</span>';
            
            try {
                // Call your Edge Function to create a checkout session
                const response = await fetch('https://pdmtvkcxnqysujnpcnyh.supabase.co/functions/v1/create-checkout-session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkbXR2a2N4bnF5c3VqbnBjbnloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA4ODQ3MjAsImV4cCI6MjA2NjQ2MDcyMH0.EJmcxGQwsCsf4uGwNAz_D_DnJxGN2ZV3Doux_FyPtEg'
                    },
                    body: JSON.stringify({
                        priceId: PRICE_ID,
                        userId: 'test-user-' + Date.now(), // Test user ID
                        tier: 'coffee',
                        successUrl: window.location.origin + '/success.html',
                        cancelUrl: window.location.origin + '/test-stripe.html'
                    })
                });

                const data = await response.json();
                
                if (data.success && data.url) {
                    message.innerHTML = '<span class="text-green-600">Redirecting to Stripe...</span>';
                    window.location.href = data.url;
                } else {
                    throw new Error(data.error || 'Failed to create checkout session');
                }
            } catch (error) {
                message.innerHTML = `<span class="text-red-600">Error: ${error.message}</span>`;
                button.disabled = false;
                button.textContent = 'Test Live Payment →';
            }
        });
    </script>
