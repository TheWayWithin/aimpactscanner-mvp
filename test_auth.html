<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Email/Password Auth</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Test Email/Password Authentication</h1>
    
    <div>
        <h2>Register</h2>
        <form id="registerForm">
            <input type="email" id="regEmail" placeholder="Email" required><br><br>
            <input type="password" id="regPassword" placeholder="Password (min 8 chars)" required><br><br>
            <button type="submit">Register</button>
        </form>
    </div>
    
    <div>
        <h2>Login</h2>
        <form id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" required><br><br>
            <input type="password" id="loginPassword" placeholder="Password" required><br><br>
            <button type="submit">Login</button>
        </form>
    </div>
    
    <div>
        <h2>Reset Password</h2>
        <form id="resetForm">
            <input type="email" id="resetEmail" placeholder="Email" required><br><br>
            <button type="submit">Send Reset Email</button>
        </form>
    </div>
    
    <div id="output"></div>
    
    <script>
        // Initialize Supabase client
        const supabaseUrl = 'YOUR_SUPABASE_URL'
        const supabaseKey = 'YOUR_SUPABASE_ANON_KEY'
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)
        
        const output = document.getElementById('output');
        
        function log(message) {
            output.innerHTML += '<p>' + message + '</p>';
            console.log(message);
        }
        
        // Register form
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        emailRedirectTo: `${window.location.origin}/reset-password`,
                        data: {
                            full_name: email.split('@')[0]
                        }
                    }
                });
                
                if (error) throw error;
                log('✅ Registration successful! Check your email.');
            } catch (error) {
                log('❌ Registration error: ' + error.message);
            }
        });
        
        // Login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) throw error;
                log('✅ Login successful!');
                log('User: ' + JSON.stringify(data.user, null, 2));
            } catch (error) {
                log('❌ Login error: ' + error.message);
            }
        });
        
        // Reset password form
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            
            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: `${window.location.origin}/reset-password`
                });
                
                if (error) throw error;
                log('✅ Password reset email sent!');
            } catch (error) {
                log('❌ Reset error: ' + error.message);
            }
        });
        
        // Listen for auth changes
        supabase.auth.onAuthStateChange((event, session) => {
            log('Auth event: ' + event);
            if (session) {
                log('User session: ' + session.user.email);
            }
        });
        
        log('Authentication test page loaded');
    </script>
</body>
</html>
